name: CI

on:
  push:
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "tsconfig.json"
      - "esbuild.mjs"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "tsconfig.json"
      - "esbuild.mjs"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - name: Package VSIX
        if: matrix.node-version == 22
        run: npx vsce package --no-dependencies --skip-license
      - name: Upload VSIX
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
